<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="岩田翔太の毎日のジャーナル">
  <title>Journal - iwata_shota</title>
  <link rel="stylesheet" href="./assets/journal.css?v=20260513-inline-device">
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="メインナビゲーション">
      <a class="active" href="./index.html" aria-current="page">Journal</a>
    </nav>

    <div class="header-inner">
      <p class="site-name">iwata_shota / Journal</p>
      <h1>毎日の記録を、時系列で読む。</h1>
      <p class="lead">日々の出来事、思考、事業の前進をそのまま残す公開ジャーナルです。</p>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar" aria-label="ジャーナル一覧">
      <div class="summary">
        <span id="entry-count">0 entries</span>
        <span id="latest-date"></span>
      </div>

      <label class="search-label" for="search">検索</label>
      <input id="search" class="search" type="search" placeholder="タイトル・本文・タグ">

      <div id="tag-list" class="tag-list" aria-label="タグ"></div>
      <div id="entry-list" class="entry-list"></div>
    </aside>

    <article id="article" class="article" aria-live="polite">
      <p class="empty">ジャーナルを読み込んでいます。</p>
    </article>
  </main>

  <footer class="site-footer">
    <span>Generated from Markdown files in <code>YYYY/MM</code>.</span>
  </footer>

  <script src="./journal-data.js?v=20260513-inline-device"></script>
  <script src="./assets/journal.js?v=20260513-inline-device"></script>
</body>
</html>
