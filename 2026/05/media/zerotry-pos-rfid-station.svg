<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">POS横RFIDステーション</title>
  <desc id="desc">POS、RFIDプリンタ、読取パッド、zerotryサーバー、商品マスタがつながる最小構成。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2c3e39"/>
    </marker>
  </defs>
  <rect width="1280" height="760" fill="#fbfbf8"/>
  <text x="64" y="74" fill="#173d34" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="34" font-weight="700">POS横に置く最初のRFIDステーション</text>
  <text x="66" y="112" fill="#6b6b63" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="18">既存POSを置き換えず、商品マスタとタグ発行・読取検査を横に追加する。</text>

  <g font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif">
    <rect x="80" y="190" width="210" height="160" rx="14" fill="#e8edf8" stroke="#98a9cf" stroke-width="2"/>
    <text x="122" y="238" fill="#253c67" font-size="24" font-weight="700">既存POS</text>
    <text x="113" y="278" fill="#2f456f" font-size="17">会計・返品</text>
    <text x="113" y="307" fill="#2f456f" font-size="17">SKU/価格</text>

    <rect x="80" y="456" width="210" height="140" rx="14" fill="#ffffff" stroke="#deded8" stroke-width="2"/>
    <text x="118" y="506" fill="#333333" font-size="23" font-weight="700">バーコード</text>
    <text x="130" y="538" fill="#6b6b63" font-size="17">商品選択</text>
    <text x="130" y="566" fill="#6b6b63" font-size="17">既存運用を残す</text>

    <rect x="420" y="160" width="260" height="185" rx="14" fill="#f5ead2" stroke="#d5b66f" stroke-width="2"/>
    <text x="464" y="208" fill="#5c4515" font-size="24" font-weight="700">RFIDプリンタ</text>
    <text x="456" y="248" fill="#604a20" font-size="17">文字/バーコード印字</text>
    <text x="456" y="277" fill="#604a20" font-size="17">EPC書込</text>
    <text x="456" y="306" fill="#604a20" font-size="17">失敗ラベルをvoid</text>

    <rect x="420" y="430" width="260" height="185" rx="14" fill="#e3f1ec" stroke="#9dc8ba" stroke-width="2"/>
    <text x="465" y="478" fill="#173d34" font-size="24" font-weight="700">読取パッド</text>
    <text x="456" y="518" fill="#27483f" font-size="17">タグを近距離で読む</text>
    <text x="456" y="547" fill="#27483f" font-size="17">SKU/EPCを検査</text>
    <text x="456" y="576" fill="#27483f" font-size="17">隣の商品を読まない</text>

    <rect x="824" y="190" width="320" height="140" rx="14" fill="#173d34"/>
    <text x="885" y="239" fill="#ffffff" font-size="24" font-weight="700">zerotry server</text>
    <text x="864" y="279" fill="#d8efe7" font-size="17">EPC採番・検査・ログ</text>
    <text x="864" y="306" fill="#d8efe7" font-size="17">POS/在庫連携</text>

    <rect x="824" y="455" width="320" height="140" rx="14" fill="#f2e8ef" stroke="#c49ab4" stroke-width="2"/>
    <text x="894" y="504" fill="#653a55" font-size="24" font-weight="700">商品マスタ</text>
    <text x="864" y="544" fill="#6b455d" font-size="17">SKU、バーコード、価格</text>
    <text x="864" y="571" fill="#6b455d" font-size="17">EPC serial、タグ仕様</text>
  </g>

  <g stroke="#2c3e39" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M292 270 H410"/>
    <path d="M292 526 H410"/>
    <path d="M682 252 H814"/>
    <path d="M682 522 H814"/>
    <path d="M984 332 V445"/>
    <path d="M550 346 V420"/>
  </g>

  <g font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="15" fill="#6b6b63">
    <text x="324" y="252">商品選択</text>
    <text x="325" y="508">商品確認</text>
    <text x="711" y="235">印字/書込要求</text>
    <text x="712" y="505">読取結果</text>
    <text x="997" y="391">参照</text>
    <text x="562" y="389">貼付後検査</text>
  </g>
</svg>
