<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">zerotry検証メトリクス</title>
  <desc id="desc">RFIDタギングステーションとラインで測るべき読取率、誤読率、書込成功率、サイクルタイム、復旧時間などの指標。</desc>
  <rect width="1280" height="760" fill="#fbfbf8"/>
  <text x="64" y="74" fill="#173d34" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="34" font-weight="700">ハードウェアは「動いた」ではなく、数値で信用を作る</text>
  <text x="66" y="112" fill="#6b6b63" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="18">Tagging Station v0では、店舗作業を止めないための最低限のメトリクスを毎回ログに残す。</text>

  <g font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif">
    <rect x="80" y="168" width="1120" height="486" rx="22" fill="#ffffff" stroke="#deded8" stroke-width="2"/>
    <line x1="80" y1="252" x2="1200" y2="252" stroke="#deded8" stroke-width="2"/>
    <line x1="440" y1="168" x2="440" y2="654" stroke="#deded8" stroke-width="2"/>
    <line x1="800" y1="168" x2="800" y2="654" stroke="#deded8" stroke-width="2"/>
    <text x="130" y="222" fill="#173d34" font-size="24" font-weight="700">品質</text>
    <text x="500" y="222" fill="#173d34" font-size="24" font-weight="700">速度</text>
    <text x="860" y="222" fill="#173d34" font-size="24" font-weight="700">復旧/運用</text>

    <text x="126" y="305" fill="#333333" font-size="20" font-weight="700">書込成功率</text>
    <text x="126" y="340" fill="#6b6b63" font-size="17">プリンタがEPCを書けた割合</text>
    <rect x="126" y="366" width="244" height="18" rx="9" fill="#e3f1ec"/>
    <rect x="126" y="366" width="224" height="18" rx="9" fill="#1f6b57"/>
    <text x="126" y="420" fill="#333333" font-size="20" font-weight="700">検査読取成功率</text>
    <text x="126" y="455" fill="#6b6b63" font-size="17">貼ったあと正しく読めた割合</text>
    <rect x="126" y="481" width="244" height="18" rx="9" fill="#e3f1ec"/>
    <rect x="126" y="481" width="224" height="18" rx="9" fill="#1f6b57"/>
    <text x="126" y="535" fill="#333333" font-size="20" font-weight="700">誤読</text>
    <text x="126" y="570" fill="#6b6b63" font-size="17">隣の商品を読んでいないか</text>

    <text x="486" y="305" fill="#333333" font-size="20" font-weight="700">1商品あたり時間</text>
    <text x="486" y="340" fill="#6b6b63" font-size="17">選択、印字、貼付、検査まで</text>
    <text x="486" y="420" fill="#333333" font-size="20" font-weight="700">POS連携遅延</text>
    <text x="486" y="455" fill="#6b6b63" font-size="17">会計や在庫登録を止めない</text>
    <text x="486" y="535" fill="#333333" font-size="20" font-weight="700">ライン処理数</text>
    <text x="486" y="570" fill="#6b6b63" font-size="17">1分あたり何点流せるか</text>

    <text x="846" y="305" fill="#333333" font-size="20" font-weight="700">プリンタ詰まり復旧</text>
    <text x="846" y="340" fill="#6b6b63" font-size="17">作業者が数分で戻せるか</text>
    <text x="846" y="420" fill="#333333" font-size="20" font-weight="700">通信断復旧</text>
    <text x="846" y="455" fill="#6b6b63" font-size="17">再接続、キュー再送、重複防止</text>
    <text x="846" y="535" fill="#333333" font-size="20" font-weight="700">原因追跡</text>
    <text x="846" y="570" fill="#6b6b63" font-size="17">設定値、RSSI、時刻を残す</text>
  </g>
</svg>
