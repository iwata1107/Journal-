<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">在庫テック導入の失敗と成功の分岐</title>
  <desc id="desc">AI在庫管理やRFIDは、技術単体ではなく、データ、現場作業、例外処理、検証まで設計して初めて成功する。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#27483f"/>
    </marker>
  </defs>
  <rect width="1280" height="760" fill="#f7f7f4"/>
  <text x="64" y="76" fill="#173d34" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="34" font-weight="700">在庫テックは「導入設計」で成否が分かれる</text>
  <text x="66" y="116" fill="#6b6b63" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="18">AI在庫管理もRFIDも、現場・データ・例外処理までつながって初めて業務になる。</text>

  <g font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif">
    <rect x="80" y="174" width="500" height="480" rx="22" fill="#ffffff" stroke="#deded8" stroke-width="2"/>
    <text x="124" y="236" fill="#8a3f35" font-size="30" font-weight="700">失敗する導入</text>
    <text x="124" y="278" fill="#6b6b63" font-size="18">技術だけを先に入れる</text>

    <rect x="124" y="330" width="170" height="58" rx="12" fill="#f5ead2" stroke="#d5b66f" stroke-width="2"/>
    <text x="160" y="366" fill="#604a20" font-size="18" font-weight="700">AI / RFID</text>
    <rect x="356" y="330" width="170" height="58" rx="12" fill="#f2e8ef" stroke="#c49ab4" stroke-width="2"/>
    <text x="394" y="366" fill="#653a55" font-size="18" font-weight="700">現場投入</text>

    <path d="M302 359 H346" stroke="#8a3f35" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

    <rect x="124" y="438" width="402" height="66" rx="12" fill="#fff7f4" stroke="#dfb4a8" stroke-width="2"/>
    <text x="152" y="479" fill="#8a3f35" font-size="20" font-weight="700">商品マスタ・作業手順・例外処理が未設計</text>

    <rect x="124" y="544" width="402" height="66" rx="12" fill="#fff7f4" stroke="#dfb4a8" stroke-width="2"/>
    <text x="152" y="585" fill="#8a3f35" font-size="20" font-weight="700">現場が手動確認に戻り、信頼が落ちる</text>
  </g>

  <g font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif">
    <rect x="700" y="174" width="500" height="480" rx="22" fill="#173d34"/>
    <text x="744" y="236" fill="#ffffff" font-size="30" font-weight="700">成功する導入</text>
    <text x="744" y="278" fill="#d8efe7" font-size="18">技術を現場業務へ変換する</text>

    <rect x="744" y="326" width="180" height="54" rx="12" fill="#e3f1ec"/>
    <text x="774" y="360" fill="#173d34" font-size="17" font-weight="700">商品マスタ</text>
    <rect x="972" y="326" width="180" height="54" rx="12" fill="#e8edf8"/>
    <text x="1002" y="360" fill="#253c67" font-size="17" font-weight="700">読取設計</text>
    <rect x="744" y="410" width="180" height="54" rx="12" fill="#f5ead2"/>
    <text x="774" y="444" fill="#5c4515" font-size="17" font-weight="700">現場フロー</text>
    <rect x="972" y="410" width="180" height="54" rx="12" fill="#f2e8ef"/>
    <text x="1002" y="444" fill="#653a55" font-size="17" font-weight="700">例外処理</text>
    <rect x="744" y="494" width="180" height="54" rx="12" fill="#ffffff"/>
    <text x="774" y="528" fill="#173d34" font-size="17" font-weight="700">POS / EC連携</text>
    <rect x="972" y="494" width="180" height="54" rx="12" fill="#ffffff"/>
    <text x="1002" y="528" fill="#173d34" font-size="17" font-weight="700">検証指標</text>

    <text x="744" y="606" fill="#ffffff" font-size="22" font-weight="700">読取結果が、正しい在庫イベントとして反映される</text>
  </g>

  <path d="M604 414 H674" stroke="#27483f" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <text x="604" y="388" fill="#173d34" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="17" font-weight="700">導入知見</text>
</svg>
