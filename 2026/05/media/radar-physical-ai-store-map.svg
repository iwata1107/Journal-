  <text x="149" y="330" fill="#604a20" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="16">商品+RFID</text>
  <text x="283" y="330" fill="#604a20" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="16">商品+RFID</text>
  <text x="417" y="330" fill="#604a20" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="16">商品+RFID</text>
  <rect x="154" y="435" width="322" height="92" rx="14" fill="#e3f1ec" stroke="#9dc8ba" stroke-width="2"/>
  <text x="220" y="488" fill="#173d34" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="22" font-weight="700">天井センサー/リーダー</text>

  <rect x="674" y="188" width="230" height="125" rx="14" fill="#e8edf8" stroke="#98a9cf" stroke-width="2"/>
  <text x="731" y="240" fill="#253c67" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="24" font-weight="700">AI推定</text>
  <text x="716" y="274" fill="#2f456f" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="16">何が / どこに / いつ動いたか</text>

