<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">RADAR型の店舗Physical AI</title>
  <desc id="desc">RFIDタグ、天井センサー、AI、在庫DB、店舗スタッフ、EC、POSがつながるPhysical AI店舗の構造。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#27483f"/>
    </marker>
  </defs>
  <rect width="1280" height="760" fill="#f7f7f4"/>
  <text x="64" y="76" fill="#173d34" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="34" font-weight="700">店舗をPhysical AI化する基本構造</text>
  <text x="66" y="116" fill="#6b6b63" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="18">商品をリアルタイムに観測し、POS、EC、スタッフ、補充判断に戻す。</text>

