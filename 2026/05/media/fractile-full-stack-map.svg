<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Fractileのフルスタック推論設計</title>
  <desc id="desc">回路、チップ、システム、推論サーバー、モデル、顧客ワークロードまでを一気通貫で設計する構造。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#27483f"/>
    </marker>
  </defs>
  <rect width="1280" height="760" fill="#fbfbf8"/>
  <text x="64" y="76" fill="#173d34" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="34" font-weight="700">AIチップは、チップ単体ではなく推論スタック全体で勝負する</text>
  <text x="66" y="116" fill="#6b6b63" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="18">Fractileの主張は、回路からクラウド推論までを同じ目的に揃えるフルスタック設計にある。</text>

  <rect x="78" y="178" width="1124" height="416" rx="24" fill="#ffffff" stroke="#deded8" stroke-width="2"/>

  <g font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif">
    <rect x="116" y="258" width="154" height="122" rx="14" fill="#f5ead2" stroke="#d5b66f" stroke-width="2"/>
    <text x="148" y="306" fill="#5c4515" font-size="22" font-weight="700">回路</text>
    <text x="139" y="338" fill="#604a20" font-size="15">transistor</text>
    <text x="139" y="362" fill="#604a20" font-size="15">memory近接</text>

    <rect x="316" y="258" width="154" height="122" rx="14" fill="#e3f1ec" stroke="#9dc8ba" stroke-width="2"/>
    <text x="348" y="306" fill="#173d34" font-size="22" font-weight="700">チップ</text>
    <text x="340" y="338" fill="#27483f" font-size="15">推論専用</text>
    <text x="340" y="362" fill="#27483f" font-size="15">低レイテンシ</text>

    <rect x="516" y="258" width="154" height="122" rx="14" fill="#e8edf8" stroke="#98a9cf" stroke-width="2"/>
    <text x="552" y="306" fill="#253c67" font-size="22" font-weight="700">システム</text>
    <text x="540" y="338" fill="#2f456f" font-size="15">サーバー</text>
    <text x="540" y="362" fill="#2f456f" font-size="15">電力/冷却</text>

    <rect x="716" y="258" width="154" height="122" rx="14" fill="#f2e8ef" stroke="#c49ab4" stroke-width="2"/>
    <text x="744" y="306" fill="#653a55" font-size="22" font-weight="700">ランタイム</text>
    <text x="739" y="338" fill="#6b455d" font-size="15">推論server</text>
    <text x="739" y="362" fill="#6b455d" font-size="15">batch/context</text>

    <rect x="916" y="258" width="154" height="122" rx="14" fill="#e8f0d9" stroke="#9ebd76" stroke-width="2"/>
    <text x="958" y="306" fill="#496820" font-size="22" font-weight="700">用途</text>
    <text x="941" y="338" fill="#536d2e" font-size="15">research</text>
    <text x="941" y="362" fill="#536d2e" font-size="15">coding/drug</text>
  </g>

  <g stroke="#27483f" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M272 319 H306"/>
    <path d="M472 319 H506"/>
    <path d="M672 319 H706"/>
    <path d="M872 319 H906"/>
  </g>

  <rect x="156" y="454" width="968" height="82" rx="16" fill="#173d34"/>
  <text x="192" y="498" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="23" font-weight="700">狙い</text>
  <text x="268" y="498" fill="#d8efe7" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="18">低レイテンシと高スループットを同時に満たし、長い推論を現実的な時間とコストに圧縮する。</text>
</svg>
