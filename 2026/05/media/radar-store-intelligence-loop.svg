<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">店舗データ化の価値ループ</title>
  <desc id="desc">在庫可視化から補充、EC連携、盗難/紛失検知、自動チェックアウトへ広がる価値ループ。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#27483f"/>
    </marker>
  </defs>
  <rect width="1280" height="760" fill="#fbfbf8"/>
  <text x="64" y="76" fill="#173d34" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="34" font-weight="700">リアルタイム在庫は、店舗の価値ループを変える</text>
  <text x="66" y="116" fill="#6b6b63" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="18">正しい在庫位置が分かると、接客、補充、EC、ロス対策、チェックアウトまで波及する。</text>

  <circle cx="640" cy="400" r="112" fill="#173d34"/>
  <text x="589" y="388" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="25" font-weight="700">商品単位の</text>
  <text x="573" y="426" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="25" font-weight="700">リアルタイム在庫</text>

  <g font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif">
    <rect x="540" y="162" width="200" height="92" rx="14" fill="#e3f1ec" stroke="#9dc8ba" stroke-width="2"/>
    <text x="591" y="216" fill="#173d34" font-size="22" font-weight="700">接客/探索</text>
    <rect x="890" y="270" width="210" height="92" rx="14" fill="#e8edf8" stroke="#98a9cf" stroke-width="2"/>
    <text x="943" y="324" fill="#253c67" font-size="22" font-weight="700">棚補充</text>
    <rect x="860" y="520" width="240" height="92" rx="14" fill="#f5ead2" stroke="#d5b66f" stroke-width="2"/>
    <text x="899" y="574" fill="#5c4515" font-size="22" font-weight="700">EC/BOPIS連携</text>
    <rect x="180" y="520" width="240" height="92" rx="14" fill="#f2e8ef" stroke="#c49ab4" stroke-width="2"/>
    <text x="220" y="574" fill="#653a55" font-size="22" font-weight="700">ロス/紛失検知</text>
    <rect x="180" y="270" width="210" height="92" rx="14" fill="#e8f0d9" stroke="#9ebd76" stroke-width="2"/>
    <text x="211" y="324" fill="#496820" font-size="22" font-weight="700">自動会計</text>
  </g>

  <g stroke="#27483f" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M641 289 V262"/>
    <path d="M746 357 C808 322 830 315 880 315"/>
    <path d="M732 478 C798 523 806 566 850 566"/>
    <path d="M547 478 C480 525 462 566 430 566"/>
    <path d="M535 357 C470 326 440 316 400 316"/>
    <path d="M638 255 C850 230 1015 250 1018 260"/>
  </g>

  <text x="410" y="676" fill="#6b6b63" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="18">最初の価値は棚卸し削減ではなく、「店舗判断のリアルタイム化」にある。</text>
</svg>
